<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qui som — Club Pesca Caiac Catalunya</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <div id="site-header"></div>

  <main class="page-main">

    <div class="container page-content">
      <div class="team-mosaic">

        <div class="team-card">
          <img class="team-photo" src="assets/img/sergiocarretero.avif" alt="Sergio Carretero" />
          <div class="team-info">
            <div class="team-role">Col·laborador Costa Brava</div>
            <div class="team-name">Sergio Carretero</div>
            <p>Passió pel mar i la pesca des de caiac.</p>
          </div>
        </div>

        <div class="team-card">
          <img class="team-photo" src="assets/img/xaviernetto.avif" alt="Xavier Netto" />
          <div class="team-info">
            <div class="team-role">President</div>
            <div class="team-name">Xavier Netto</div>
            <p>A vegades si em veieu que estic amb la mirada perduda i absent... segurament estaré pensant amb el mar.</p>
          </div>
        </div>

        <div class="team-card">
          <img class="team-photo" src="assets/img/mariacabello.avif" alt="Maria Cabello" />
          <div class="team-info">
            <div class="team-role">Secretaria-Tresorera</div>
            <div class="team-name">Maria Cabello</div>
            <p></p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/components.js"></script>
  <script src="assets/js/script.js"></script>

</html>
