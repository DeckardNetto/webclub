<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacte — Club Pesca Caiac Catalunya</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <div id="site-header"></div>

  <main class="page-main">

    <div class="container page-content">
      <div class="contacte-grid">
        <div class="contacte-info">
          <h3>Informació de contacte</h3>
          <ul class="contact-list">
            <li>
              <span class="contact-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
              <a href="https://maps.google.com/?q=Puerto+del+Garraf,+Garraf,+Barcelona" target="_blank" rel="noopener" class="link">Port del Garraf, Barcelona</a>
            </li>
            <li>
              <span class="contact-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
              <a href="tel:+34605989814">+34 605 989 814</a>
            </li>
            <li>
              <span class="contact-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
              <a href="mailto:info.clubpescacaiaccatalunya@gmail.com">info.clubpescacaiaccatalunya@gmail.com</a>
            </li>
          </ul>
        </div>
        <div class="contacte-form-wrap">
          <h3>Envia'ns un missatge</h3>
          <form id="contacte-form" action="https://formspree.io/f/xkoywnyw" method="POST" novalidate>
            <div class="form-group">
              <label for="c-nom">Nom *</label>
              <input type="text" id="c-nom" name="nom" required placeholder="El teu nom" />
            </div>
            <div class="form-group">
              <label for="c-email">Correu electrònic *</label>
              <input type="email" id="c-email" name="email" required placeholder="tu@exemple.com" />
            </div>
            <div class="form-group">
              <label for="c-assumpte">Assumpte</label>
              <input type="text" id="c-assumpte" name="assumpte" placeholder="Assumpte del missatge" />
            </div>
            <div class="form-group">
              <label for="c-missatge">Missatge *</label>
              <textarea id="c-missatge" name="missatge" rows="5" required placeholder="Escriu aquí el teu missatge..."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn--primary">Enviar missatge</button>
            </div>
            <div id="contacte-form-status" class="form-status" aria-live="polite"></div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/components.js"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
